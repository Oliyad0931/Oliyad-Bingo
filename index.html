<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliyad Bingo - Multiplayer & Wallet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-bar">
        <div class="user-info">ID: <span id="userIdDisplay">---</span></div>
        <div class="wallet-info">Balance: <span id="balanceDisplay">0</span> ETB</div>
        <div class="nav-btns">
            <button onclick="showModal('depositModal')">Deposit</button>
            <button onclick="showModal('withdrawModal')">Withdraw</button>
        </div>
    </div>
<div class="game-container">
        <h1>OLIYAD BINGO</h1>
        <div class="multiplayer-status">
            <span id="playerCount">Searching for players...</span>
        </div>

        <div class="status-panel">
            <div id="currentNumber">--</div>
            <button id="drawBtn" disabled>Draw Number (50 ETB)</button>
        </div>

        <div class="bingo-board" id="board"></div>
        <div id="message"></div>
        <button id="resetBtn">Reset Board</button>
    </div>
<!-- Deposit Modal -->
    <div id="depositModal" class="modal">
        <div class="modal-content">
            <h2>DEPOSIT FUNDS</h2>
            <div class="payment-methods">
                <p><strong>Telebirr / CBE Birr:</strong> 0967692398</p>
                <p><strong>CBE Bank:</strong> 1000438187937</p>
                <p><strong>Name:</strong> Oliyad Tefera</p>
            </div>
            <p style="font-size: 0.8rem; color: #aaa;">Paste your SMS confirmation message below for automatic verification:</p>
            <textarea id="smsPasteArea" placeholder="Paste Telebirr or CBE message here..."></textarea>
            <button onclick="verifyTransaction()">Verify Transaction</button>
            <button class="close-btn" onclick="hideModal('depositModal')">Cancel</button>
        </div>
    </div>
<!-- Withdraw Modal -->
    <div id="withdrawModal" class="modal">
        <div class="modal-content">
            <h2>WITHDRAW FUNDS</h2>
            <input type="number" id="withdrawAmount" placeholder="Amount ETB">
            <select id="withdrawMethod">
                <option value="telebirr">Telebirr</option>
                <option value="cbe">CBE Bank</option>
            </select>
            <input type="text" id="withdrawAccount" placeholder="Phone or Account Number">
            <button onclick="processWithdrawal()">Submit Request</button>
            <button class="close-btn" onclick="hideModal('withdrawModal')">Cancel</button>
        </div>
    </div>
<script src="script.js"></script>
</body>
              </html>
