<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Oliyad Bingo — Card Select & Rooms</title>
  <link rel="icon" href="data:;base64,=" />
  <style>
    body { font-family: Arial, sans-serif; padding: 1rem; max-width:900px; margin:auto }
    #card { display: grid; gap: 6px; margin-bottom: 1rem; }
    .cell { width: 60px; height: 60px; display:flex;align-items:center;justify-content:center;
           border:1px solid #ccc;border-radius:6px;cursor:pointer; user-select:none; }
    .cell.selected { background:#4CAF50;color:white; }
    #players { margin-top: 1rem; }
    .controls { margin-bottom:1rem; }
    input[type="text"], select { padding:6px; }
    button { padding:6px 10px; margin-left:6px; }
    #status { margin-top: 0.5rem; color:#333 }
  </style>
</head>
<body>
  <h1>Oliyad Bingo — Card selection & Rooms</h1>

  <div class="controls">
    <label for="size">Card size:</label>
    <select id="size">
      <option value="5" selected>5×5</option>
      <option value="4">4×4</option>
      <option value="3">3×3</option>
    </select>
    <button id="generateBtn">Generate Card</button>
    <button id="selectBtn" disabled>Select this card</button>
  </div>

  <div id="cardContainer">
    <div id="card"></div>
  </div>

  <div class="controls">
    <input id="name" placeholder="Your name" />
    <button id="createRoomBtn" disabled>Create room</button>

    <input id="roomIdInput" placeholder="Room ID to join" />
    <button id="joinRoomBtn" disabled>Join room</button>
  </div>

  <div id="status"></div>

  <div id="players"><strong>Players in room:</strong>
    <ul id="playerList"></ul>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
